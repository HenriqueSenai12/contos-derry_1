<!--icon_livro-->

<svg width="100" height="100" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6D28D9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4C1D95;stop-opacity:1" />
    </linearGradient>
  </defs>
  <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" stroke="url(#purpleGrad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" stroke="url(#purpleGrad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>





  <!--icon lupa-->
<svg width="100" height="100" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="searchGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED" />
      <stop offset="100%" style="stop-color:#6D28D9" />
    </linearGradient>
  </defs>
  <circle cx="11" cy="11" r="8" stroke="url(#searchGrad)" stroke-width="2.5" filter="url(#softGlow)"/>
  <path d="M21 21l-4.35-4.35" stroke="url(#searchGrad)" stroke-width="3" stroke-linecap="round"/>
</svg>



<!--icon usuario -->
<svg width="100" height="100" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="userGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A78BFA;stop-opacity:1" /> <stop offset="100%" style="stop-color:#4C1D95;stop-opacity:1" /> </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <circle cx="12" cy="7" r="4" fill="url(#userGrad)" filter="url(#softGlow)"/>
  <path d="M4 21v-2a4 4 0 0 1 4-4h8a4 4 0 0 1 4 4v2" stroke="url(#userGrad)" stroke-width="2" stroke-linecap="round" filter="url(#softGlow)"/>
</svg>




<!--icon favorito-->
<svg width="200" height="200" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="heartGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A78BFA;stop-opacity:1" /> <stop offset="50%" style="stop-color:#6D28D9;stop-opacity:1" /> <stop offset="100%" style="stop-color:#4C1D95;stop-opacity:1" /> </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" 
        fill="url(#heartGrad)" filter="url(#glow)" stroke="#EDE9FE" stroke-width="0.5"/>
</svg>


<!--icon biblioteca-->
<svg width="200" height="200" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect x="4" y="4" width="4" height="16" rx="1" fill="#4C1D95" stroke="#EDE9FE" stroke-width="0.5"/> <rect x="9" y="2" width="4" height="18" rx="1" fill="#6D28D9" stroke="#EDE9FE" stroke-width="0.5"/> <rect x="14" y="6" width="4" height="14" rx="1" fill="#7C3AED" stroke="#EDE9FE" stroke-width="0.5"/> <path d="M2 22h20" stroke="#3F3F46" stroke-width="2" stroke-linecap="round"/> </svg>
